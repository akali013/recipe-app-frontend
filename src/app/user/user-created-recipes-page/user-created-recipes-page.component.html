<div class="created-recipe-table-container">
  <app-search-bar (searchEvent)="searchRecipes($event)"></app-search-bar>

  <table mat-table [dataSource]="createdRecipeDataSource" matSort role="grid" aria-label="Recipes table">
    <!-- Recipe name column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Recipe</th>
      <td mat-cell *matCellDef="let recipe" tabindex="0">{{recipe.name}}</td>
      <!-- tabindex=0 makes the recipe name tabbable -->
    </ng-container>

    <!-- Type column -->
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
      <td mat-cell *matCellDef="let recipe">{{recipe.type}}</td>
    </ng-container>

    <!-- Remove column -->
    <ng-container matColumnDef="remove">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Remove</th>
      <td mat-cell *matCellDef="let recipe">
        <button class="remove-button" (click)="removeCreatedRecipe(recipe); $event.stopPropagation()"
          (keydown)="removeCreatedRecipe(recipe, $event); $event.stopPropagation()">
          <img class="remove-icon" src="../../../assets/delete.png" />
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="tableColumns"></tr>
    <tr mat-row *matRowDef="let recipe; columns: tableColumns" (click)="inspectRecipe(recipe)"
      (keydown)="inspectRecipe(recipe, $event)"></tr>
    
      <!-- Default row for when there is no data -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="3">You have not created a recipe. Create one in the Add Recipes page!</td>
    </tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" aria-label="Select page of recipes"></mat-paginator>
</div>
